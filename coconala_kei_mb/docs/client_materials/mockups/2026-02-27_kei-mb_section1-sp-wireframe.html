<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kei mb LP Wireframe - Section 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-start: #f3f8ff;
        --bg-end: #d7e8ff;
        --ink: #14314f;
        --ink-sub: #365a7f;
        --brand: #1b74d8;
        --accent: #ff7b22;
        --accent-2: #ffb347;
        --line: #c8daf1;
        --panel: #ffffff;
        --ok: #22a06b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Zen Kaku Gothic New", sans-serif;
        color: var(--ink);
        background: radial-gradient(120% 90% at 80% -10%, #ffffff 0%, transparent 55%),
          linear-gradient(165deg, var(--bg-start), var(--bg-end));
      }

      .frame {
        max-width: 420px;
        min-height: 100svh;
        margin: 0 auto;
        padding: 10px 14px 24px;
      }

      .topline {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .brand {
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.04em;
      }

      .trust {
        font-size: 11px;
        color: var(--ink-sub);
        text-align: right;
      }

      .trust strong {
        display: block;
        color: var(--brand);
        font-size: 18px;
        line-height: 1.1;
      }

      .hero {
        border: 1px solid var(--line);
        background: linear-gradient(150deg, #ffffff 0%, #eaf3ff 100%);
        border-radius: 20px;
        padding: 16px 14px 14px;
        box-shadow: 0 12px 28px rgba(20, 49, 79, 0.1);
      }

      .copy-top {
        margin: 0 0 8px;
        font-size: 12px;
        font-weight: 700;
        color: var(--ink-sub);
      }

      .copy-main {
        margin: 0;
        font-family: "Shippori Mincho B1", serif;
        font-size: 29px;
        line-height: 1.08;
        letter-spacing: 0.01em;
      }

      .copy-main em {
        font-style: normal;
        color: var(--brand);
      }

      .copy-sub {
        margin: 10px 0 0;
        font-size: 13px;
        color: var(--ink-sub);
      }

      .proof {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .proof-card {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 12px;
        padding: 8px 6px;
        text-align: center;
      }

      .proof-card .label {
        display: block;
        font-size: 10px;
        color: var(--ink-sub);
      }

      .proof-card .value {
        display: block;
        font-weight: 900;
        font-size: 14px;
        margin-top: 2px;
      }

      .form-shell {
        margin-top: 12px;
        border: 2px solid #9bc2f1;
        border-radius: 16px;
        padding: 12px 10px 10px;
        background: #f7fbff;
      }

      .field {
        margin-bottom: 8px;
      }

      .field label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        margin-bottom: 5px;
      }

      .control {
        width: 100%;
        border: 1px solid #b8d2f0;
        border-radius: 10px;
        height: 42px;
        padding: 0 12px;
        font: inherit;
        font-size: 14px;
        color: var(--ink);
        background: #fff;
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }

      .segmented input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .segmented label {
        margin: 0;
        border: 1px solid #b8d2f0;
        background: #fff;
        border-radius: 10px;
        text-align: center;
        font-size: 13px;
        font-weight: 700;
        line-height: 38px;
      }

      .segmented input:checked + label {
        border-color: var(--ok);
        background: #e8fbf2;
        color: #105f3f;
      }

      .cta-row {
        position: relative;
        margin-top: 10px;
      }

      .free-badge {
        position: absolute;
        left: 8px;
        top: -10px;
        width: 50px;
        height: 50px;
        border-radius: 999px;
        border: 2px solid #fff;
        background: linear-gradient(145deg, #2db267, #1f8f53);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 13px;
        font-weight: 900;
        box-shadow: 0 6px 14px rgba(15, 90, 55, 0.25);
      }

      .cta {
        width: 100%;
        height: 52px;
        border: 0;
        border-radius: 14px;
        padding-left: 44px;
        font: inherit;
        font-size: 16px;
        font-weight: 900;
        color: #fff;
        background: linear-gradient(145deg, var(--accent), var(--accent-2));
        box-shadow: 0 10px 20px rgba(255, 123, 34, 0.35);
      }

      .lead {
        margin: 9px 0 0;
        text-align: center;
        font-size: 11px;
        color: var(--ink-sub);
      }

      .note {
        margin-top: 10px;
        font-size: 10px;
        line-height: 1.5;
        color: #4f6984;
      }

      @media (min-width: 700px) {
        body {
          padding: 30px 0;
        }

        .frame {
          border: 1px solid #bed5f0;
          border-radius: 24px;
          box-shadow: 0 16px 38px rgba(20, 49, 79, 0.15);
          background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(246, 251, 255, 0.95));
        }
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <div class="topline">
        <div class="brand">Kei mb 引越し一括見積</div>
        <p class="trust">
          利用実績
          <strong>7,850,000+</strong>
        </p>
      </div>

      <section class="hero" aria-label="ファーストビューと初期フォーム">
        <p class="copy-top">最短1分で、複数社へ無料依頼</p>
        <h1 class="copy-main"><em>いちばん安い</em>引越し先を、すぐ比較。</h1>
        <p class="copy-sub">最初の入力は3項目だけ。スマホで迷わず進めます。</p>

        <div class="proof">
          <article class="proof-card">
            <span class="label">対応エリア</span>
            <span class="value">全国</span>
          </article>
          <article class="proof-card">
            <span class="label">比較社数</span>
            <span class="value">最大10社</span>
          </article>
          <article class="proof-card">
            <span class="label">入力時間</span>
            <span class="value">約1分</span>
          </article>
        </div>

        <form class="form-shell" action="#" method="post">
          <div class="field">
            <label for="zip">現住所の郵便番号</label>
            <input
              class="control"
              id="zip"
              name="zip"
              type="tel"
              inputmode="numeric"
              maxlength="7"
              placeholder="例: 1540024"
            />
          </div>

          <div class="field">
            <label for="pref">引越し先の都道府県</label>
            <select class="control" id="pref" name="pref">
              <option value="">都道府県を選択</option>
              <option>東京都</option>
              <option>神奈川県</option>
              <option>埼玉県</option>
              <option>千葉県</option>
              <option>大阪府</option>
              <option>福岡県</option>
            </select>
          </div>

          <div class="field">
            <label>世帯人数</label>
            <div class="segmented">
              <div>
                <input id="type-single" type="radio" name="family" value="single" checked />
                <label for="type-single">単身</label>
              </div>
              <div>
                <input id="type-two" type="radio" name="family" value="two" />
                <label for="type-two">2人</label>
              </div>
              <div>
                <input id="type-three" type="radio" name="family" value="three-plus" />
                <label for="type-three">3人以上</label>
              </div>
            </div>
          </div>

          <div class="cta-row">
            <span class="free-badge">無料</span>
            <button class="cta" type="submit">見積もりを始める</button>
          </div>
          <p class="lead">現在、春の引越し時期で依頼が増えています。</p>
        </form>

        <p class="note">
          ワイヤー用モックです。文言・数値・注釈はヒアリング確定後に差し替えます。
        </p>
      </section>
    </main>
  </body>
</html>
